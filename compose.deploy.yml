# Deploy compose for the Komodo stack (see docker-compose.yml for
# local builds). Runs the CI-published Docker Hub image; Komodo
# writes the stack's environment block to stack.env alongside this
# file at deploy time.
services:
  openhand:
    image: fsecada01/openhand:latest
    container_name: openhand
    restart: unless-stopped
    ports:
      - "8010:8000"
    env_file:
      - stack.env
    environment:
      # gliderlabs/registrator reads SERVICE_NAME + SERVICE_TAGS from
      # the environment (not docker labels) and registers them in
      # Consul. Traefik's consulCatalog provider runs with
      # exposedByDefault: false, so the tags below opt the service in.
      # server.url must be host IP + published port — Traefik on .76
      # can't reach .62 container IPs.
      SERVICE_NAME: openhand
      # Both hostnames route to the same service — see the openwebui
      # stack for the same `||` pattern. openhandnavigator.org needs
      # its own A record (see project notes) before Traefik's HTTP-01
      # challenge can issue it a cert; openhand.francissecada.com
      # keeps working in the meantime.
      SERVICE_TAGS: "traefik.enable=true,traefik.http.routers.openhand.rule=Host(`openhand.francissecada.com`) || Host(`openhandnavigator.org`) || Host(`www.openhandnavigator.org`),traefik.http.routers.openhand.entrypoints=websecure,traefik.http.routers.openhand.tls.certresolver=letsencrypt,traefik.http.routers.openhand.middlewares=secureHeaders@file,traefik.http.services.openhand.loadbalancer.server.url=http://192.168.1.62:8010"
      DATABASE_URL: sqlite:////app/data/openhand.db
      SQL_DIALECT: sqlite
    volumes:
      - openhand_data:/app/data

volumes:
  openhand_data:
