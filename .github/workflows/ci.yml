name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      SQL_DIALECT: sqlite
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --group dev
      - name: Lint
        run: uv run ruff check . && uv run ruff format --check .
      - name: Test (eval harness + unit + web)
        run: uv run pytest -q
