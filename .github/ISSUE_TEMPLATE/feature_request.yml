name: ✨ Feature request
description: Suggest an improvement or new capability
title: "[feature]: "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Who needs this, and what can't they do today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - New benefit program
        - State-specific rules
        - Intake / conversation flow
        - Explanation / plain language
        - Accessibility / translation
        - Mutual aid resources
        - API / integrations
        - Other
    validations:
      required: true
